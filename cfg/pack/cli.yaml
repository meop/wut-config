dnf:
  add:
    - sudo dnf copr enable atim/bottom
    - sudo dnf copr enable atim/starship
    - sudo dnf copr enable varlad/zellij
  rem:
    - sudo dnf copr remove varlad/zellij
    - sudo dnf copy remove atim/starship
    - sudo dnf copr remove atim/bottom
  names:
    - bottom
    - ca-certificates
    - coreutils
    - curl
    - fd-find
    - fzf
